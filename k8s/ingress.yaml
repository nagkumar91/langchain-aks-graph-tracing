apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workflow-agent
  namespace: agent-tracing-demo
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - agent.example.com
      secretName: workflow-agent-tls
  rules:
    - host: agent.example.com
      http:
        paths:
          - path: /invoke
            pathType: Prefix
            backend:
              service:
                name: workflow-agent
                port:
                  number: 80
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: workflow-agent
                port:
                  number: 80
          - path: /readyz
            pathType: Prefix
            backend:
              service:
                name: workflow-agent
                port:
                  number: 80
          - path: /version
            pathType: Prefix
            backend:
              service:
                name: workflow-agent
                port:
                  number: 80
