apiVersion: apps/v1
kind: Deployment
metadata:
  name: zava-travel-agent
  namespace: agent-tracing-demo
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: zava-travel-agent
  template:
    metadata:
      labels:
        app: zava-travel-agent
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: zava-travel-agent-sa
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: zava-travel-agent
          image: 7a88072nitya3pagents81b7acr.azurecr.io/zava-travel-agent:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: zava-travel-agent-config
            - secretRef:
                name: zava-travel-agent-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
