apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-agent
  namespace: agent-tracing-demo
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: workflow-agent
  template:
    metadata:
      labels:
        app: workflow-agent
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: workflow-agent-sa
      containers:
        - name: workflow-agent
          image: <your-acr-name>.azurecr.io/langgraph-workflow-agent:<tag>
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: workflow-agent-config
            - secretRef:
                name: workflow-agent-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
