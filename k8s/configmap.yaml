apiVersion: v1
kind: ConfigMap
metadata:
  name: zava-travel-agent-config
  namespace: agent-tracing-demo
data:
  OTEL_SERVICE_NAME: "zava-travel-agent"
  OTEL_RECORD_CONTENT: "true"
  OTEL_TRACES_SAMPLER: "always_on"
  OTEL_TRACES_SAMPLER_ARG: "1.0"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=dev"
  AZURE_OPENAI_API_VERSION: "2025-01-01-preview"
  AZURE_OPENAI_ENDPOINT: "https://nitya-3p-agents-gateway.azure-api.net/nitya-3p-agents-resource"
  AZURE_OPENAI_CHAT_DEPLOYMENT: "gpt-4.1"
  DEMO_FORCE_GOTO: "true"
  DEMO_TOOL_FAILURE_RATE: "0.0"
  DEMO_RETRIEVER_TOPK: "3"
  BUILD_SHA: "dev"
  IMAGE_TAG: "dev"
  BUILD_ID: "local"
