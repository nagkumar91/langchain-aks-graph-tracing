name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  IMAGE_NAME: langgraph-workflow-agent

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Compile check
        run: python -m compileall app
      - name: Unit tests
        run: pytest

  build-image:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .
      - name: Login to ACR
        if: ${{ secrets.ACR_LOGIN_SERVER != '' }}
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Push image
        if: ${{ secrets.ACR_LOGIN_SERVER != '' }}
        run: |
          docker tag $IMAGE_NAME:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:${{ github.sha }}

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-image
    if: ${{ github.ref == 'refs/heads/main' && secrets.KUBECONFIG_B64 != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
      - name: Decode kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
      - name: Deploy manifests
        run: kubectl apply -k k8s
      - name: Smoke test
        run: |
          kubectl -n agent-tracing-demo rollout status deployment/workflow-agent
